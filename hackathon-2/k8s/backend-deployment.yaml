apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: hackathon-2
  labels:
    app: backend
    version: "2.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        dapr.io/enabled:      "true"
        dapr.io/app-id:       "todo-backend"
        dapr.io/app-port:     "8000"
        dapr.io/app-protocol: "http"
    spec:
      containers:
        - name: backend
          image: YOUR_REGISTRY/hackathon-2-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "128Mi"
              cpu:    "100m"
            limits:
              memory: "256Mi"
              cpu:    "500m"
          envFrom:
            - secretRef:
                name: hackathon-2-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
