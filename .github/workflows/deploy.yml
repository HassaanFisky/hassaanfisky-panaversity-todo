name: CI/CD — Hackathon II

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY:        ghcr.io
  IMAGE_BACKEND:   ghcr.io/${{ github.repository_owner }}/hackathon-2-backend
  IMAGE_FRONTEND:  ghcr.io/${{ github.repository_owner }}/hackathon-2-frontend
  IMAGE_RECURRING: ghcr.io/${{ github.repository_owner }}/hackathon-2-recurring
  IMAGE_NOTIFY:    ghcr.io/${{ github.repository_owner }}/hackathon-2-notify

jobs:
  lint-backend:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: pip install ruff
      - run: ruff check backend/ recurring-service/ notification-service/

  lint-frontend:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push recurring-service
        uses: docker/build-push-action@v5
        with:
          context: recurring-service
          push: true
          tags: |
            ${{ env.IMAGE_RECURRING }}:latest
            ${{ env.IMAGE_RECURRING }}:${{ github.sha }}

      - name: Build & push notification-service
        uses: docker/build-push-action@v5
        with:
          context: notification-service
          push: true
          tags: |
            ${{ env.IMAGE_NOTIFY }}:latest
            ${{ env.IMAGE_NOTIFY }}:${{ github.sha }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Patch image tags
        run: |
          sed -i "s|YOUR_REGISTRY/hackathon-2-backend:latest|${{ env.IMAGE_BACKEND }}:${{ github.sha }}|g"  k8s/backend-deployment.yaml
          sed -i "s|YOUR_REGISTRY/hackathon-2-frontend:latest|${{ env.IMAGE_FRONTEND }}:${{ github.sha }}|g" k8s/frontend-deployment.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/dapr/ -n hackathon-2
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/backend  -n hackathon-2 --timeout=120s
          kubectl rollout status deployment/frontend -n hackathon-2 --timeout=120s
