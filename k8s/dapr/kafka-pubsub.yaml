apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: kafka-pubsub
  namespace: hackathon-2
spec:
  type: pubsub.kafka
  version: v1
  metadata:
    - name: brokers
      value: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
    - name: authRequired
      value: "false"
    - name: initialOffset
      value: "newest"
    - name: consumeRetryInterval
      value: "200ms"
